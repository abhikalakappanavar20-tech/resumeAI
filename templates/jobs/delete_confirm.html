{% extends 'base/base.html' %}
{% block title %}Delete Job - ResumeIQ{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm text-center p-5">
                <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                <h4>Delete Job?</h4>
                <p class="text-muted">Delete <strong>{{ job.title }}</strong> at {{ job.company_name }}?</p>
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'jobs:job_detail' job.pk %}" class="btn btn-secondary">Cancel</a>
                    <form method="post">{% csrf_token %}<button type="submit" class="btn btn-danger">Delete</button></form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
