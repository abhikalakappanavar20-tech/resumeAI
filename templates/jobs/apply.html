{% extends 'base/base.html' %}
{% block title %}Apply - {{ job.title }} - ResumeIQ{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h4 class="mb-2">Apply for {{ job.title }}</h4>
                    <p class="text-muted">{{ job.company_name }} &bull; {{ job.location }}</p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Select Resume</label>
                            {{ form.resume }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cover Letter</label>
                            {{ form.cover_letter }}
                        </div>
                        <button type="submit" class="btn btn-primary px-4"><i class="fas fa-paper-plane me-2"></i>Submit Application</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
