{% extends 'base/base.html' %}
{% block title %}Delete Resume - ResumeIQ{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                    <h4>Delete Resume?</h4>
                    <p class="text-muted">Are you sure you want to delete <strong>{{ resume.title }}</strong>? This action cannot be undone.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <a href="{% url 'resumes:resume_detail' resume.pk %}" class="btn btn-secondary">Cancel</a>
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
